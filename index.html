<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radijupa - Microsite</title>
    <style>
        /* Tema Minimalis Elegan - Deep Winter */
        :root {
             background-image: url("images/Dark\ mode\ wallpaper.jfif"); /* ganti dengan path gambar kamu */
  background-size: cover;        /* biar gambar memenuhi layar */
  background-position: center;   /* posisi tengah */
  background-repeat: no-repeat;  /* biar tidak diulang */
            --primary-color: #080707; /* Biru dongker pekat */
            --transition-speed: 0.4s;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 20px; /* Jaga-jaga untuk layar HP yang sangat kecil */
        }

        /* Kontainer Micro Site */
        .container {
            width: 100%;
            max-width: 420px; 
            padding: 50px 30px;
            background-color: rgb(255, 255, 255);
            border: 1px solid rgba(18, 44, 79, 0.2); 
            box-shadow: 0 20px 40px rgba(18, 44, 79, 0.05); 
            text-align: center;
            animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bagian Foto Profil */
        .profile-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%; /* Membuat foto jadi lingkaran */
            border: 2px solid var(--primary-color);
            margin: 0 auto 20px auto;
            display: block;
            padding: 4px; /* Jarak antara foto dan garis bingkai */
            filter: grayscale(50%);
            transition: filter var(--transition-speed) ease, transform var(--transition-speed) ease;
        }

        .profile-photo:hover {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        /* Header (Titel, Sub-titel & Bio) */
        .header-profile {
            margin-bottom: 35px;
        }

        h1 {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 2.5rem;
            font-weight: normal;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            color: rgba(18, 44, 79, 0.8); 
            margin-bottom: 15px;
            display: block;
        }

        .bio-text {
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 300;
            margin: 0 auto 20px auto;
            padding: 0 10px;
            color: rgba(18, 44, 79, 0.9);
        }

        .divider {
            width: 40px;
            height: 2px;
            background-color: var(--primary-color);
            margin: 0 auto;
        }

        /* Pembungkus Tombol */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Desain Tombol Bergaya Kartu */
        .link-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 20px;
            text-decoration: none;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            background-color: transparent;
            transition: all var(--transition-speed) ease;
            position: relative;
            overflow: hidden;
        }

        .link-title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            margin-bottom: 5px;
            transition: color var(--transition-speed) ease;
            z-index: 2;
        }

        .link-url {
            font-size: 0.8rem;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            opacity: 0.8;
            transition: color var(--transition-speed) ease;
            z-index: 2;
        }

        /* Efek Hover Latar Belakang */
        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-color);
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform var(--transition-speed) cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1;
        }

        .link-card:hover::before {
            transform: scaleY(1);
        }

        .link-card:hover .link-title,
        .link-card:hover .link-url {
            color: var(--bg-color); /* Teks berubah jadi krem saat disentuh */
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(18, 44, 79, 0.15);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header-profile">
            <img src="portofolio/assets/img/profile/Profile Picture.jpeg" alt="Foto Alvin Farrel" class="profile-photo">
            
            <h1>Raditya Dwitama</h1>
            <h2>Radwijupa</h2>
            <span class="subtitle">Administrator & Programmer</span>
            
            <p class="bio-text">Administrator and programmer focused on building structured systems and efficient digital solutions.</p>
            
            <div class="divider"></div>
        </div>

        <div class="links-wrapper">
            
            <a href="cv/cv/cv.html
            " target="_blank" class="link-card">
                <span class="link-title">Curriculum Vitae</span>
                <span class="link-url">radwijupa.my.id</span>
            </a>
            
            <a href="portofolio/index.html" target="_blank" class="link-card">
                <span class="link-title">Profil & Portofolio Lengkap</span>
                <span class="link-url">radwijupa.vercel.app</span>
            </a>

        </div>

    </div>

</body>
</html>
